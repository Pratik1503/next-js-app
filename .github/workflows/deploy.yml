
name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:

    runs-on: ubuntu-latest

    
    steps: 
     - uses : actions/checkout@v4
     - run : docker build . -t lucifer1503/next-js-app:latest
     - run : echo "${{secrets.DOCKERHUB_PASSWORD}}" | docker login -u {{secrets.DOCEKRHUB_USERNAME}} --password-stdin
     - run : docker push lucifer1503/next-js-app:latest

